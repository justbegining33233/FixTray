<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>FixTray — QA Checklist</title>
<style>
  :root {
    --bg: #09090B;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --shop: #F59E0B;
    --tech: #10B981;
    --customer: #06B6D4;
    --manager: #8B5CF6;
    --admin: #EF4444;
    --superadmin: #F43F5E;
    --go: #10B981;
    --nogo: #EF4444;
    --nt: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }
  /* ── HEADER ── */
  .doc-header {
    background: linear-gradient(135deg, #0f0f11 0%, #1a1a20 100%);
    border-bottom: 1px solid rgba(239,68,68,0.3);
    padding: 28px 40px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .doc-header .logo {
    width: 44px; height: 44px;
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .doc-header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.3px; }
  .doc-header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .doc-header .meta { margin-left: auto; text-align: right; font-size: 11px; color: var(--muted); }
  .doc-header .meta strong { display: block; font-size: 13px; color: #cbd5e1; }

  /* ── ROLE TABS ── */
  .role-tabs {
    display: flex;
    gap: 4px;
    padding: 12px 40px;
    background: #0c0c0f;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    position: sticky; top: 92px; z-index: 99;
  }
  .role-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    background: var(--surface);
    color: var(--muted);
    text-decoration: none;
  }
  .role-tab:hover { border-color: var(--accent); color: var(--accent); }
  .role-tab[data-role="shop"]       { --accent: var(--shop); }
  .role-tab[data-role="tech"]       { --accent: var(--tech); }
  .role-tab[data-role="customer"]   { --accent: var(--customer); }
  .role-tab[data-role="manager"]    { --accent: var(--manager); }
  .role-tab[data-role="admin"]      { --accent: var(--admin); }
  .role-tab[data-role="superadmin"] { --accent: var(--superadmin); }
  .role-tab.active { background: color-mix(in srgb, var(--accent) 15%, transparent); border-color: var(--accent); color: var(--accent); }

  /* ── MAIN ── */
  .main { padding: 32px 40px; max-width: 1200px; }

  /* ── ROLE SECTION ── */
  .role-section { margin-bottom: 48px; scroll-margin-top: 140px; }
  .role-heading {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    border-radius: 10px 10px 0 0;
    border: 1px solid var(--accent);
    border-bottom: none;
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.2px;
    background: color-mix(in srgb, var(--accent) 10%, transparent);
    color: var(--accent);
  }
  .role-heading .role-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  .role-heading .page-count { margin-left: auto; font-size: 11px; font-weight: 500; color: var(--muted); }
  .role-body {
    border: 1px solid var(--accent);
    border-top: 1px solid rgba(255,255,255,0.06);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  /* ── PAGE CARD ── */
  .page-card {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .page-card:last-child { border-bottom: none; }

  .page-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    background: rgba(0,0,0,0.2);
    transition: background .12s;
  }
  .page-header:hover { background: rgba(255,255,255,0.04); }
  .page-header .page-title { font-size: 13px; font-weight: 600; color: #e2e8f0; }
  .page-header .page-route {
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 10%, transparent);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }
  .page-header .toggle-icon { margin-left: auto; color: var(--muted); font-size: 11px; transition: transform .2s; }
  .page-header.open .toggle-icon { transform: rotate(90deg); }

  /* Page-level overall status */
  .page-overall {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px 0;
    font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
  }

  .page-body { padding: 0 16px 16px; display: none; }
  .page-body.open { display: block; }

  /* ── SECTION GROUP ── */
  .section-group { margin-top: 14px; }
  .section-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted);
    padding: 4px 8px;
    background: rgba(255,255,255,0.03);
    border-radius: 4px;
    margin-bottom: 6px;
    display: inline-block;
  }

  /* ── ITEM ROW ── */
  .item-row {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 6px;
    background: rgba(0,0,0,0.2);
  }
  .item-top {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .item-name { font-size: 12px; color: #cbd5e1; flex: 1; min-width: 140px; }
  .status-group { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .status-label {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all .12s;
  }
  .status-label.go-label   { border-color: rgba(16,185,129,.3); color: rgba(16,185,129,.6); }
  .status-label.nogo-label { border-color: rgba(239,68,68,.3);  color: rgba(239,68,68,.6); }
  .status-label.nt-label   { border-color: rgba(107,114,128,.3); color: rgba(107,114,128,.6); }
  input[type="radio"] { display: none; }
  input[type="radio"]:checked + .status-label.go-label   { background: rgba(16,185,129,.15); border-color: var(--go);  color: var(--go);   }
  input[type="radio"]:checked + .status-label.nogo-label { background: rgba(239,68,68,.15);  border-color: var(--nogo); color: var(--nogo); }
  input[type="radio"]:checked + .status-label.nt-label   { background: rgba(107,114,128,.12); border-color: var(--nt); color: #9ca3af; }
  .item-notes {
    width: 100%; border: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    color: var(--text);
    font-size: 11px;
    padding: 6px 8px;
    resize: vertical; min-height: 38px;
    font-family: inherit;
    transition: border-color .12s;
  }
  .item-notes:focus { outline: none; border-color: var(--accent); }
  .item-notes::placeholder { color: #4b5563; }

  /* ── PAGE OVERALL STATUS ── */
  .overall-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .overall-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
    margin-right: 4px;
  }

  /* ── ROLE COLOR VARS ── */
  .role-shop       { --accent: var(--shop); }
  .role-tech       { --accent: var(--tech); }
  .role-customer   { --accent: var(--customer); }
  .role-manager    { --accent: var(--manager); }
  .role-admin      { --accent: var(--admin); }
  .role-superadmin { --accent: var(--superadmin); }

  /* ── PROGRESS BAR ── */
  .progress-wrap { padding: 16px 40px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
  .progress-bar-bg { background: rgba(255,255,255,0.06); border-radius: 4px; height: 8px; overflow: hidden; margin-top: 6px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #10B981, #06B6D4); border-radius: 4px; transition: width .4s; }
  .progress-text { font-size: 11px; color: var(--muted); }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; color: #000; font-size: 10px; }
    .doc-header { background: #f8f8f8; color: #000; position: relative; top: auto; border-bottom: 2px solid #ccc; }
    .doc-header h1, .doc-header .subtitle, .doc-header .meta, .doc-header .meta strong { color: #000; }
    .role-tabs, .progress-wrap { display: none; }
    .main { padding: 0; }
    .role-section { page-break-before: always; }
    .role-section:first-child { page-break-before: avoid; }
    .page-card { page-break-inside: avoid; }
    .page-body { display: block !important; }
    .page-header .toggle-icon { display: none; }
    .role-heading { background: #eee !important; border: 1px solid #bbb; color: #222; }
    .role-dot { background: #555 !important; }
    .role-body { border: 1px solid #bbb; }
    .page-header { background: #f5f5f5; border-bottom: 1px solid #ddd; }
    .page-title { color: #111 !important; }
    .page-route { color: #555 !important; background: #eee !important; }
    .item-row { border: 1px solid #ddd; background: #fafafa; margin-bottom: 4px; }
    .item-name { color: #222 !important; }
    .status-label { border-color: #999 !important; color: #555 !important; }
    input[type="radio"]:checked + .status-label.go-label   { background: #d1fae5 !important; color: #065f46 !important; }
    input[type="radio"]:checked + .status-label.nogo-label { background: #fee2e2 !important; color: #991b1b !important; }
    input[type="radio"]:checked + .status-label.nt-label   { background: #f3f4f6 !important; color: #374151 !important; }
    .item-notes {
      background: #fff !important; color: #000 !important;
      border: 1px solid #ccc !important;
      min-height: 28px !important;
    }
    .section-label { color: #555 !important; background: #eee !important; }
  }
</style>
</head>

// ════════════════════════════════════════════════════════════════
// RENDER ENGINE
// ════════════════════════════════════════════════════════════════
let itemCounter = 0;
const totalItems = { val: 0 };
const testedItems = { val: 0 };

function makeId(prefix) {
  return `qai-${prefix}-${++itemCounter}`;
}

function makeStatusGroup(uid) {
  const goId   = `${uid}-go`;
  const nogoId = `${uid}-nogo`;
  const ntId   = `${uid}-nt`;
  return `
    <div class="status-group">
      <input type="radio" id="${goId}"   name="${uid}" value="go">
      <label for="${goId}"   class="status-label go-label">✅ Go</label>
      <input type="radio" id="${nogoId}" name="${uid}" value="nogo">
      <label for="${nogoId}" class="status-label nogo-label">❌ No Go</label>
      <input type="radio" id="${ntId}"   name="${uid}" value="nt" checked>
      <label for="${ntId}"   class="status-label nt-label">⬜ Not Tested</label>
    </div>`;
}

function renderItems(items, sectionKey, pageKey, roleKey) {
  if (!items || items.length === 0) return '';
  const sectionNames = { buttons: '🔲 Buttons', links: '🔗 Links', cards: '🃏 Cards', forms: '📝 Form Fields', tabs: '📑 Tabs' };
  const label = sectionNames[sectionKey] || sectionKey;

  let html = `<div class="section-group"><span class="section-label">${label}</span>`;
  items.forEach((item, idx) => {
    const uid = `${roleKey}-${pageKey}-${sectionKey}-${idx}`;
    totalItems.val++;
    html += `
      <div class="item-row">
        <div class="item-top">
          <span class="item-name">${escHtml(item)}</span>
          ${makeStatusGroup(uid)}
        </div>
        <textarea class="item-notes" data-uid="${uid}" placeholder="What's happening / What should happen…" rows="2"></textarea>
      </div>`;
  });
  html += '</div>';
  return html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,'');
}

function renderPage(page, pageIdx, roleKey) {
  const pageKey = slugify(page.route || page.title);
  const headerId = `ph-${roleKey}-${pageIdx}`;
  const bodyId   = `pb-${roleKey}-${pageIdx}`;
  const overallUid = `${roleKey}-${pageKey}-overall`;
  totalItems.val++;

  let sectionsHtml = '';
  ['buttons','links','cards','forms','tabs'].forEach(sec => {
    if (page[sec] && page[sec].length > 0) {
      sectionsHtml += renderItems(page[sec], sec, pageKey, roleKey);
    }
  });

  return `
  <div class="page-card">
    <div class="page-header" id="${headerId}" onclick="togglePage('${bodyId}','${headerId}')" tabindex="0" role="button" aria-expanded="false">
      <span class="page-title">${escHtml(page.title)}</span>
      <span class="page-route">${escHtml(page.route)}</span>
      <span class="toggle-icon">▶</span>
    </div>
    <div class="page-overall">
      <span class="overall-label">Page Overall:</span>
      ${makeStatusGroup(overallUid)}
    </div>
    <div class="page-body" id="${bodyId}">
      ${sectionsHtml}
    </div>
  </div>`;
}

function renderRole(roleData) {
  const key = roleData.key;
  const sectionId = `role-${key}`;
  let pagesHtml = '';
  roleData.pages.forEach((page, idx) => {
    pagesHtml += renderPage(page, idx, key);
  });

  return `
  <section class="role-section role-${key}" id="${sectionId}">
    <div class="role-heading">
      <span class="role-dot"></span>
      ${roleData.role} Role
      <span class="page-count">${roleData.pages.length} pages</span>
    </div>
    <div class="role-body">${pagesHtml}</div>
  </section>`;
}

function renderAll() {
  const main = document.getElementById('main');
  let html = '';
  // Count first pass (reset counter)
  itemCounter = 0;
  totalItems.val = 0;
  QA_DATA.forEach(rd => {
    html += renderRole(rd);
  });
  main.innerHTML = html;
  document.getElementById('progress-summary').textContent = `0 / ${totalItems.val} items tested`;
  document.getElementById('date-stamp').textContent = new Date().toLocaleDateString('en-US', {weekday:'short',year:'numeric',month:'short',day:'numeric'});
  attachListeners();
}

function togglePage(bodyId, headerId) {
  const body = document.getElementById(bodyId);
  const header = document.getElementById(headerId);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  header.classList.toggle('open', !isOpen);
  header.setAttribute('aria-expanded', String(!isOpen));
}

function attachListeners() {
  // Track progress on radio changes
  document.querySelectorAll('input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', updateProgress);
  });
  // Save/restore state from sessionStorage
  restoreState();
}

function updateProgress() {
  const allRadios = document.querySelectorAll('input[type="radio"]');
  const groupsSeen = new Set();
  const testedGroups = new Set();
  allRadios.forEach(r => {
    groupsSeen.add(r.name);
    if (r.checked && r.value !== 'nt') testedGroups.add(r.name);
  });
  const total = groupsSeen.size;
  const tested = testedGroups.size;
  const pct = total > 0 ? Math.round((tested / total) * 100) : 0;
  document.getElementById('progress-summary').textContent = `${tested} / ${total} items tested`;
  document.getElementById('pct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  saveState();
}

// ── PERSIST STATE ──
function saveState() {
  try {
    const state = {};
    document.querySelectorAll('input[type="radio"]').forEach(r => {
      if (r.checked) state[r.name] = r.value;
    });
    document.querySelectorAll('.item-notes').forEach(ta => {
      if (ta.value) state['note__' + ta.dataset.uid] = ta.value;
    });
    sessionStorage.setItem('fixtray_qa', JSON.stringify(state));
  } catch(e) {}
}

function restoreState() {
  try {
    const raw = sessionStorage.getItem('fixtray_qa');
    if (!raw) return;
    const state = JSON.parse(raw);
    Object.entries(state).forEach(([key, val]) => {
      if (key.startsWith('note__')) {
        const uid = key.slice(6);
        const ta = document.querySelector(`.item-notes[data-uid="${uid}"]`);
        if (ta) ta.value = val;
      } else {
        const radio = document.querySelector(`input[name="${key}"][value="${val}"]`);
        if (radio) radio.checked = true;
      }
    });
    updateProgress();
    // Save notes on change too
    document.querySelectorAll('.item-notes').forEach(ta => {
      ta.addEventListener('input', saveState);
    });
  } catch(e) {}
}

// ── ROLE TABS ──
document.querySelectorAll('.role-tab').forEach(tab => {
  tab.addEventListener('click', function(e) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});

// ── KEYBOARD SUPPORT ──
document.addEventListener('keydown', function(e) {
  if (e.target.classList.contains('page-header') && (e.key === 'Enter' || e.key === ' ')) {
    e.target.click();
  }
});

// ── INIT ──
renderAll();

// Add note listeners after render
setTimeout(() => {
  document.querySelectorAll('.item-notes').forEach(ta => {
    ta.addEventListener('input', saveState);
  });
  updateProgress();
}, 100);
</script>
